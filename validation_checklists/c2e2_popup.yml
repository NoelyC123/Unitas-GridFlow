name: C2E2 popup checks
checks:
  - id: c2e2_popup_core_sections
    description: Support popup includes the reality-based C2E2 sections.
    type: c2e2_support_popup_text_contains
    contains:
      - Identity and role
      - Geometry and measured evidence
      - QA and review status
      - Survey context
  - id: c2e2_popup_field_labels_render
    description: Support popup includes practical field labels from the C2E2 popup model.
    type: c2e2_support_popup_text_contains
    contains:
      - Point ID
      - Feature Code
      - Measured Height
      - Material
