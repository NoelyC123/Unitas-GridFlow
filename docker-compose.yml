services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports: ["9000:9000","9001:9001"]
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    healthcheck:
      test: ["CMD","mc","ready","local"]
      interval: 5s
      timeout: 3s
      retries: 20

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: unitas-gridflow
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    command: bash -lc "python -m gunicorn -b 0.0.0.0:5001 run:app"
    environment:
      FLASK_ENV: development
      PORT: 5001
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-unitas-gridflow-uploads}
      BASIC_AUTH_ENABLED: ${BASIC_AUTH_ENABLED:-true}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASS: ${ADMIN_PASS:-admin}
    volumes:
      - .:/code
    working_dir: /code
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports: ["5001:5001"]

  nginx:
    image: nginx:stable
    profiles: ["with-nginx"]
    ports: ["80:80"]
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/frontend/.htpasswd:/etc/nginx/.htpasswd:ro
    depends_on:
      app:
        condition: service_started
