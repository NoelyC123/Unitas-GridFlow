<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SpanCore EW – Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    .map-summary-card{ position:absolute; top:20px; right:20px; width:320px; z-index:1000; }
  </style>
</head>
<body class="p-0">
  <div id="map" style="height:100vh; width:100%"></div>

  <div id="mapSummary" class="map-summary-card card">
    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
      <h6 class="mb-0">
        <i class="bi bi-info-circle"></i> Job <span id="jobIdDisplay">{{ job_id }}</span>
      </h6>
    </div>
    <div class="card-body" id="summaryBody">
      <div class="row text-center mb-3">
        <div class="col-6"><div><i class="bi bi-broadcast-pin text-primary fs-4"></i><h5 id="poleCount">-</h5><small class="text-muted">Poles</small></div></div>
        <div class="col-6"><div><i class="bi bi-bezier text-secondary fs-4"></i><h5 id="spanCount">-</h5><small class="text-muted">Spans</small></div></div>
      </div>
      <div class="row text-center mb-3">
        <div class="col-4"><i class="bi bi-check-circle text-success fs-3"></i><h5 class="text-success" id="passCount">-</h5><small>PASS</small></div>
        <div class="col-4"><i class="bi bi-exclamation-triangle text-warning fs-3"></i><h5 class="text-warning" id="warnCount">-</h5><small>WARN</small></div>
        <div class="col-4"><i class="bi bi-x-circle text-danger fs-3"></i><h5 class="text-danger" id="failCount">-</h5><small>FAIL</small></div>
      </div>
      <div id="rulepackBadge" class="mb-2"></div>
      <a href="/pdf/qa/{{ job_id }}" class="btn btn-sm btn-danger" target="_blank"><i class="bi bi-file-pdf"></i> Download PDF</a>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/toast.js"></script>
  <script src="/static/js/map-viewer.js"></script>
  <script>document.addEventListener('DOMContentLoaded',()=>{ window.initMap('{{ job_id }}'); });</script>
</body>
</html>
