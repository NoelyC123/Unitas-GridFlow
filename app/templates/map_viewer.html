<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SpanCore EW – Map Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="job-id" content="{{ job_id }}" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    crossorigin=""
  />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #f5f7fb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .topbar {
      background: #111827;
      color: #fff;
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 700;
    }

    .topbar .sub {
      font-size: 0.9rem;
      opacity: 0.85;
    }

    .topbar-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .content-shell {
      flex: 1;
      display: flex;
      min-height: 0;
      position: relative;
    }

    #map {
      flex: 1;
      min-height: 100%;
    }

    .side-panel {
      position: absolute;
      top: 18px;
      right: 18px;
      width: 320px;
      max-width: calc(100vw - 36px);
      z-index: 900;
    }

    .summary-card {
      border: 0;
      border-radius: 14px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .summary-header {
      background: #111827;
      color: #fff;
      padding: 14px 16px;
      font-weight: 700;
      font-size: 1.05rem;
    }

    .summary-body {
      background: #fff;
      padding: 16px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px 12px;
      margin-bottom: 14px;
    }

    .stat-block {
      text-align: center;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
      color: #111827;
    }

    .stat-label {
      font-size: 0.95rem;
      color: #4b5563;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0 12px;
      text-align: center;
    }

    .status-value {
      font-size: 1.8rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .status-pass {
      color: #2e8b57;
    }

    .status-warn {
      color: #d39e00;
    }

    .status-fail {
      color: #d94141;
    }

    .status-label {
      font-size: 0.95rem;
      color: #374151;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.92rem;
      margin: 8px 0;
      color: #374151;
    }

    .action-stack {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .issue-note {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: #f8fafc;
      font-size: 0.9rem;
      color: #475569;
    }

    .leaflet-popup-content {
      min-width: 170px;
    }

    .popup-title {
      font-weight: 700;
      margin-bottom: 4px;
      color: #111827;
    }

    .popup-row {
      font-size: 0.92rem;
      margin: 2px 0;
    }

    .badge-soft {
      display: inline-block;
      font-size: 0.8rem;
      padding: 5px 9px;
      border-radius: 999px;
      background: #4fc3e8;
      color: #fff;
      font-weight: 700;
    }

    @media (max-width: 768px) {
      .side-panel {
        position: static;
        width: 100%;
        max-width: 100%;
        padding: 12px;
      }

      .content-shell {
        flex-direction: column;
        overflow: auto;
      }

      #map {
        min-height: 58vh;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="topbar">
      <div>
        <h1>SpanCore EW — QA Map Viewer</h1>
        <div class="sub">Job <span id="job-id-top">{{ job_id }}</span></div>
      </div>

      <div class="topbar-actions">
        <a href="/upload" class="btn btn-sm btn-light">
          <i class="bi bi-arrow-left"></i> Back to Upload
        </a>
        <a href="/jobs/" class="btn btn-sm btn-outline-light">
          <i class="bi bi-folder2-open"></i> Jobs
        </a>
      </div>
    </div>

    <div class="content-shell">
      <div id="map"></div>

      <div class="side-panel">
        <div class="card summary-card">
          <div class="summary-header">
            Job <span id="job-id-panel">{{ job_id }}</span>
          </div>

          <div class="summary-body">
            <div class="stat-grid">
              <div class="stat-block">
                <div id="pole-count" class="stat-value">0</div>
                <div class="stat-label">Poles</div>
              </div>
              <div class="stat-block">
                <div id="span-count" class="stat-value">0</div>
                <div class="stat-label">Spans</div>
              </div>
            </div>

            <div class="status-grid">
              <div>
                <div id="pass-count" class="status-value status-pass">0</div>
                <div class="status-label">PASS</div>
              </div>
              <div>
                <div id="warn-count" class="status-value status-warn">0</div>
                <div class="status-label">WARN</div>
              </div>
              <div>
                <div id="fail-count" class="status-value status-fail">0</div>
                <div class="status-label">FAIL</div>
              </div>
            </div>

            <div class="meta-row">
              <span>Rulepack</span>
              <span id="rulepack-badge" class="badge-soft">Loading…</span>
            </div>

            <div class="meta-row">
              <span>Auto-normalized</span>
              <strong id="auto-normalized">Unknown</strong>
            </div>

            <div class="meta-row">
              <span>Issue count</span>
              <strong id="issue-count">0</strong>
            </div>

            <div class="action-stack">
              <a id="btn-download-pdf" href="/pdf/qa/{{ job_id }}" class="btn btn-danger">
                <i class="bi bi-file-pdf"></i> Download PDF
              </a>

              <a id="btn-open-upload" href="/upload" class="btn btn-outline-primary">
                <i class="bi bi-cloud-upload"></i> Upload another file
              </a>
            </div>

            <div id="issue-note" class="issue-note">
              Click any marker on the map to inspect that record.
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="/static/js/map-viewer.js?v=3"></script>
</body>
</html>
