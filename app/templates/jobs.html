<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Unitas GridFlow — Jobs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    body {
      background: #f5f7fb;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page-wrap {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .page-header h1 {
      margin: 0;
      font-size: 1.6rem;
      font-weight: 700;
      color: #111827;
    }

    .page-sub {
      color: #6b7280;
      margin-top: 4px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .jobs-card {
      border: 0;
      border-radius: 16px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      overflow: hidden;
    }

    .jobs-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 16px;
      padding: 16px;
      background: #f8fafc;
    }

    .job-summary-card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 16px;
      background: #fff;
      box-shadow: 0 1px 4px rgba(15,23,42,0.04);
    }

    .job-card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .job-meta-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .job-metric {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 9px 10px;
      background: #f9fafb;
      min-width: 0;
    }

    .job-metric-value {
      font-size: 1rem;
      font-weight: 800;
      color: #111827;
      line-height: 1.1;
    }

    .job-metric-label {
      font-size: 0.72rem;
      color: #6b7280;
      margin-top: 3px;
      white-space: nowrap;
    }

    .eq-pill {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 700;
      line-height: 1;
    }

    .eq-green { background: #e8f7ee; color: #1d7f49; }
    .eq-amber { background: #fff4d6; color: #946200; }
    .eq-red { background: #fdeaea; color: #c83737; }

    .readiness-summary {
      font-size: 0.92rem;
      color: #374151;
    }

    .job-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .table thead th {
      white-space: nowrap;
      vertical-align: middle;
    }

    .table tbody td {
      vertical-align: middle;
    }

    .job-id {
      font-weight: 700;
      color: #111827;
    }

    .status-pill {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1;
      text-transform: capitalize;
    }

    .status-complete {
      background: #e8f7ee;
      color: #1d7f49;
    }

    .status-error {
      background: #fdeaea;
      color: #c83737;
    }

    .status-processing,
    .status-pending,
    .status-uploaded,
    .status-awaiting_upload {
      background: #eef2ff;
      color: #4f46e5;
    }

    .rulepack-badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #4fc3e8;
      color: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      line-height: 1;
    }

    .count-stack {
      line-height: 1.3;
      font-size: 0.92rem;
      color: #374151;
    }

    .count-stack strong {
      color: #111827;
    }

    .empty-state {
      padding: 36px 20px;
      text-align: center;
      color: #6b7280;
    }

    .error-box {
      display: none;
      margin-bottom: 16px;
    }

    .small-note {
      font-size: 0.88rem;
      color: #6b7280;
    }

    @media (max-width: 900px) {
      .desktop-only {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-header">
      <div>
        <h1>Unitas GridFlow — Jobs</h1>
        <div class="page-sub">Browse previous uploads, open the QA map, and download the report PDF.</div>
      </div>

      <div class="toolbar">
        <a href="/projects/" class="btn btn-outline-dark">
          <i class="bi bi-collection"></i> Projects
        </a>

        <a href="/upload" class="btn btn-primary">
          <i class="bi bi-cloud-upload"></i> New Upload
        </a>

        <button id="btn-refresh" class="btn btn-outline-secondary" type="button">
          <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
      </div>
    </div>

    <div id="error-box" class="alert alert-danger error-box" role="alert"></div>

    <div class="card jobs-card">
      <div class="card-body p-0">
        <div id="jobs-tbody" class="jobs-list">
          <div class="empty-state">Loading jobs…</div>
        </div>
      </div>
    </div>

    <div class="small-note mt-3">
      Tip: completed jobs should normally have both a Map and PDF action available.
    </div>
  </div>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function statusClass(status) {
      const s = String(status || "").toLowerCase();
      if (s === "complete") return "status-complete";
      if (s === "error" || s === "failed") return "status-error";
      return "status-processing";
    }

    function buildCounts(meta) {
      const poleCount = meta.pole_count ?? 0;
      const issueCount = meta.issue_count ?? 0;
      const passCount = meta.pass_count ?? 0;
      const warnCount = meta.warn_count ?? 0;
      const failCount = meta.fail_count ?? 0;

      return `
        <div class="count-stack">
          <div><strong>Poles:</strong> ${poleCount}</div>
          <div><strong>Issues:</strong> ${issueCount}</div>
          <div><strong>Pass / Warning / Fail:</strong> ${passCount}/${warnCount}/${failCount}</div>
        </div>
      `;
    }

    function buildActions(meta) {
      const jobId = meta.job_id || "";
      const status = String(meta.status || "").toLowerCase();

      if (!jobId) {
        return '<span class="text-muted">No actions</span>';
      }

      const buttons = [];
      if (meta.workspace_ready) {
        buttons.push(`
          <a href="/workspace/view/${jobId}" class="btn btn-sm btn-outline-dark">
            <i class="bi bi-eye"></i> View
          </a>
        `);
      }
      if (meta.export_ready) {
        buttons.push(`
          <a href="/workspace/export/${jobId}/excel" class="btn btn-sm btn-outline-success">
            <i class="bi bi-file-earmark-excel"></i> Export Excel
          </a>
        `);
        buttons.push(`
          <a href="/workspace/export/${jobId}/csv" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-filetype-csv"></i> Export CSV
          </a>
        `);
        buttons.push(`
          <a href="/workspace/export/${jobId}/pdf" class="btn btn-sm btn-outline-danger">
            <i class="bi bi-file-pdf"></i> Export PDF
          </a>
        `);
      }
      if (status === "complete") {
        buttons.push(`
          <a href="/map/view/${jobId}" class="btn btn-sm btn-outline-primary">
            <i class="bi bi-map"></i> Map
          </a>
        `);
      }
      if (!buttons.length) {
        return '<span class="text-muted">Processing…</span>';
      }
      return `<div class="job-actions">${buttons.join("")}</div>`;
    }

    function buildNotes(meta) {
      if (meta.error) {
        return `<span class="text-danger">${escapeHtml(meta.error)}</span>`;
      }

      if (meta.auto_normalized) {
        return "Auto-normalized input";
      }

      return '<span class="text-muted">—</span>';
    }

    function readinessSummary(meta) {
      const summary = meta.readiness_summary;
      if (!summary) return '<span class="text-muted">No readiness summary</span>';
      return `
        <div class="readiness-summary">
          <strong>${summary.ready} Ready</strong> /
          ${summary.review} Review /
          ${summary.not_ready} Not Ready
          ${summary.insufficient ? `/ ${summary.insufficient} Insufficient` : ""}
        </div>
      `;
    }

    function evidenceQualityPill(meta) {
      const indicator = String(meta.evidence_quality_indicator || "RED").toUpperCase();
      const klass = indicator === "GREEN" ? "eq-green" : indicator === "AMBER" ? "eq-amber" : "eq-red";
      return `<span class="eq-pill ${klass}">${indicator}</span>`;
    }

    function formatDate(epochSeconds) {
      if (!epochSeconds) return "—";
      const date = new Date(Number(epochSeconds) * 1000);
      if (Number.isNaN(date.getTime())) return "—";
      return date.toLocaleDateString("en-GB", {
        year: "numeric",
        month: "short",
        day: "2-digit",
      });
    }

    function renderJobs(jobs) {
      const tbody = document.getElementById("jobs-tbody");
      if (!tbody) return;

      if (!Array.isArray(jobs) || jobs.length === 0) {
        tbody.innerHTML = `<div class="empty-state">No jobs found yet. Upload a survey to create the first job.</div>`;
        return;
      }

      const sorted = [...jobs].sort((a, b) =>
        String(b.job_id || "").localeCompare(String(a.job_id || ""))
      );

      tbody.innerHTML = sorted.map((meta) => {
        const jobId = escapeHtml(meta.job_id || "");
        const status = escapeHtml(meta.status || "unknown");
        const rulepack = escapeHtml(meta.rulepack_id || "Unknown");
        const filename = escapeHtml(meta.filename || "—");

        return `
          <article class="job-summary-card">
            <div class="job-card-top">
              <div>
                <div class="job-id">${jobId}</div>
                <div class="page-sub">${filename}</div>
              </div>
              <div class="d-flex flex-column align-items-end gap-2">
                <span class="status-pill ${statusClass(meta.status)}">${status}</span>
                <span class="rulepack-badge">${rulepack}</span>
              </div>
            </div>
            <div class="d-flex align-items-center justify-content-between gap-2">
              ${readinessSummary(meta)}
              ${evidenceQualityPill(meta)}
            </div>
            <div class="job-meta-grid">
              <div class="job-metric">
                <div class="job-metric-value">${meta.photo_count_total ?? 0}</div>
                <div class="job-metric-label">Photos</div>
              </div>
              <div class="job-metric">
                <div class="job-metric-value">${formatDate(meta.last_assessed_date)}</div>
                <div class="job-metric-label">Last assessed</div>
              </div>
              <div class="job-metric">
                <div class="job-metric-value">${meta.pole_count ?? 0}</div>
                <div class="job-metric-label">Poles</div>
              </div>
              <div class="job-metric">
                <div class="job-metric-value">${meta.issue_count ?? 0}</div>
                <div class="job-metric-label">Issues</div>
              </div>
            </div>
            <div class="count-stack">
              <div><strong>Pass / Warning / Fail:</strong> ${meta.pass_count ?? 0}/${meta.warn_count ?? 0}/${meta.fail_count ?? 0}</div>
              <div><strong>Notes:</strong> ${buildNotes(meta)}</div>
            </div>
            <div>${buildActions(meta)}</div>
          </article>
        `;
      }).join("");
    }

    async function loadJobs() {
      const errorBox = document.getElementById("error-box");
      const tbody = document.getElementById("jobs-tbody");

      try {
        if (errorBox) {
          errorBox.style.display = "none";
          errorBox.textContent = "";
        }

        if (tbody) {
          tbody.innerHTML = `<div class="empty-state">Loading jobs…</div>`;
        }

        const res = await fetch("/api/jobs/", { cache: "no-store" });

        if (!res.ok) {
          throw new Error(`Failed to load jobs: ${res.status}`);
        }

        const data = await res.json();
        renderJobs(data.jobs || []);
      } catch (err) {
        console.error(err);

        if (errorBox) {
          errorBox.textContent = err.message || String(err);
          errorBox.style.display = "block";
        }

        if (tbody) {
          tbody.innerHTML = `<div class="empty-state">Could not load jobs.</div>`;
        }
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById("btn-refresh")?.addEventListener("click", loadJobs);
      loadJobs();
    });
  </script>
</body>
</html>
