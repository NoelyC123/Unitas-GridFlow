<!doctype html>

<html lang="en">

<head>

  <meta charset="utf-8" />

  <title>SpanCore EW – Jobs</title>

  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>

    body {

      background: #f5f7fb;

      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    }

    .page-wrap {

      max-width: 1180px;

      margin: 0 auto;

      padding: 24px 16px 40px;

    }

    .page-header {

      display: flex;

      align-items: center;

      justify-content: space-between;

      gap: 12px;

      flex-wrap: wrap;

      margin-bottom: 20px;

    }

    .page-header h1 {

      margin: 0;

      font-size: 1.6rem;

      font-weight: 700;

      color: #111827;

    }

    .page-sub {

      color: #6b7280;

      margin-top: 4px;

    }

    .toolbar {

      display: flex;

      gap: 10px;

      flex-wrap: wrap;

    }

    .jobs-card {

      border: 0;

      border-radius: 16px;

      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);

      overflow: hidden;

    }

    .table thead th {

      white-space: nowrap;

      vertical-align: middle;

    }

    .table tbody td {

      vertical-align: middle;

    }

    .job-id {

      font-weight: 700;

      color: #111827;

    }

    .status-pill {

      display: inline-block;

      padding: 6px 10px;

      border-radius: 999px;

      font-size: 0.82rem;

      font-weight: 700;

      line-height: 1;

    }

    .status-complete {

      background: #e8f7ee;

      color: #1d7f49;

    }

    .status-error {

      background: #fdeaea;

      color: #c83737;

    }

    .status-processing,

    .status-pending,

    .status-uploaded,

    .status-awaiting_upload {

      background: #eef2ff;

      color: #4f46e5;

    }

    .rulepack-badge {

      display: inline-block;

      padding: 6px 10px;

      border-radius: 999px;

      background: #4fc3e8;

      color: #fff;

      font-size: 0.82rem;

      font-weight: 700;

      line-height: 1;

    }

    .count-stack {

      line-height: 1.3;

      font-size: 0.92rem;

      color: #374151;

    }

    .count-stack strong {

      color: #111827;

    }

    .empty-state {

      padding: 36px 20px;

      text-align: center;

      color: #6b7280;

    }

    .error-box {

      display: none;

      margin-bottom: 16px;

    }

    .small-note {

      font-size: 0.88rem;

      color: #6b7280;

    }

    @media (max-width: 900px) {

      .desktop-only {

        display: none;

      }

    }

  </style>

</head>

<body>

  <div class="page-wrap">

    <div class="page-header">

      <div>

        <h1>SpanCore EW — Jobs</h1>

        <div class="page-sub">Browse previous uploads, open the QA map, and download the report PDF.</div>

      </div>

      <div class="toolbar">

        <a href="/upload" class="btn btn-primary">

          <i class="bi bi-cloud-upload"></i> Upload New Survey

        </a>

        <button id="btn-refresh" class="btn btn-outline-secondary" type="button">

          <i class="bi bi-arrow-clockwise"></i> Refresh

        </button>

      </div>

    </div>

    <div id="error-box" class="alert alert-danger error-box" role="alert"></div>

    <div class="card jobs-card">

      <div class="card-body p-0">

        <div class="table-responsive">

          <table class="table table-hover align-middle mb-0">

            <thead class="table-light">

              <tr>

                <th>Job</th>

                <th>Status</th>

                <th>Rulepack</th>

                <th>Counts</th>

                <th class="desktop-only">Source File</th>

                <th class="desktop-only">Notes</th>

                <th>Actions</th>

              </tr>

            </thead>

            <tbody id="jobs-tbody">

              <tr>

                <td colspan="7" class="empty-state">Loading jobs…</td>

              </tr>

            </tbody>

          </table>

        </div>

      </div>

    </div>

    <div class="small-note mt-3">

      Tip: completed jobs should have both a Map and PDF action available.

    </div>

  </div>

  <script>

    function escapeHtml(value) {

      return String(value ?? '')

        .replaceAll('&', '&amp;')

        .replaceAll('<', '&lt;')

        .replaceAll('>', '&gt;')

        .replaceAll('"', '&quot;')

        .replaceAll("'", '&#039;');

    }

    function statusClass(status) {

      const s = String(status || '').toLowerCase();

      if (s === 'complete') return 'status-complete';

      if (s === 'error' || s === 'failed') return 'status-error';

      return 'status-processing';

    }

    function buildCounts(meta) {

      const poleCount = meta.pole_count ?? 0;

      const issueCount = meta.issue_count ?? 0;

      const passCount = meta.pass_count ?? 0;

      const warnCount = meta.warn_count ?? 0;

      const failCount = meta.fail_count ?? 0;

      return `

        <div class="count-stack">

          <div><strong>Poles:</strong> ${poleCount}</div>

          <div><strong>Issues:</strong> ${issueCount}</div>

          <div><strong>P/W/F:</strong> ${passCount}/${warnCount}/${failCount}</div>

        </div>

      `;

    }

    function buildActions(meta) {

      const jobId = meta.job_id || '';

      const status = String(meta.status || '').toLowerCase();

      if (!jobId) {

        return '<span class="text-muted">No actions</span>';

      }

      const mapBtn = `

        <a href="/map/view/${jobId}" class="btn btn-sm btn-outline-primary me-2">

          <i class="bi bi-map"></i> Map

        </a>

      `;

      const pdfBtn = `

        <a href="/pdf/qa/${jobId}" class="btn btn-sm btn-outline-danger">

          <i class="bi bi-file-pdf"></i> PDF

        </a>

      `;

      if (status === 'complete') {

        return mapBtn + pdfBtn;

      }

      if (status === 'error' || status === 'failed') {

        return `

          <a href="/pdf/qa/${jobId}" class="btn btn-sm btn-outline-danger">

            <i class="bi bi-file-pdf"></i> PDF

          </a>

        `;

      }

      return '<span class="text-muted">Processing…</span>';

    }

    function buildNotes(meta) {

      if (meta.error) {

        return `<span class="text-danger">${escapeHtml(meta.error)}</span>`;

      }

      if (meta.auto_normalized) {

        return 'Auto-normalized input';

      }

      return '<span class="text-muted">—</span>';

    }

    function renderJobs(jobs) {

      const tbody = document.getElementById('jobs-tbody');

      if (!tbody) return;

      if (!Array.isArray(jobs) || jobs.length === 0) {

        tbody.innerHTML = `

          <tr>

            <td colspan="7" class="empty-state">

              No jobs found yet. Upload a survey to create the first job.

            </td>

          </tr>

        `;

        return;

      }

      const sorted = [...jobs].sort((a, b) => String(b.job_id || '').localeCompare(String(a.job_id || '')));

      tbody.innerHTML = sorted.map(meta => {

        const jobId = escapeHtml(meta.job_id || '');

        const status = escapeHtml(meta.status || 'unknown');

        const rulepack = escapeHtml(meta.rulepack_id || 'Unknown');

        const filename = escapeHtml(meta.filename || '—');

        return `

          <tr>

            <td>

              <div class="job-id">${jobId}</div>

            </td>

            <td>

              <span class="status-pill ${statusClass(meta.status)}">${status}</span>

            </td>

            <td>

              <span class="rulepack-badge">${rulepack}</span>

            </td>

            <td>${buildCounts(meta)}</td>

            <td class="desktop-only">${filename}</td>

            <td class="desktop-only">${buildNotes(meta)}</td>

            <td>${buildActions(meta)}</td>

          </tr>

        `;

      }).join('');

    }

    async function loadJobs() {

      const errorBox = document.getElementById('error-box');

      const tbody = document.getElementById('jobs-tbody');

      try {

        if (errorBox) {

          errorBox.style.display = 'none';

          errorBox.textContent = '';

        }

        if (tbody) {

          tbody.innerHTML = `

            <tr>

              <td colspan="7" class="empty-state">Loading jobs…</td>

            </tr>

          `;

        }

        const res = await fetch('/api/jobs/', { cache: 'no-store' });

        if (!res.ok) {

          throw new Error(`Failed to load jobs: ${res.status}`);

        }

        const data = await res.json();

        renderJobs(data.jobs || []);

      } catch (err) {

        console.error(err);

        if (errorBox) {

          errorBox.textContent = err.message || String(err);

          errorBox.style.display = 'block';

        }

        if (tbody) {

          tbody.innerHTML = `

            <tr>

              <td colspan="7" class="empty-state">Could not load jobs.</td>

            </tr>

          `;

        }

      }

    }

    document.addEventListener('DOMContentLoaded', () => {

      document.getElementById('btn-refresh')?.addEventListener('click', loadJobs);

      loadJobs();

    });

  </script>

</body>

</html>
