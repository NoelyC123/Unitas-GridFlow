<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Map Preview – EW Design Tool</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <h1>GIS Map Preview</h1>
  <p>This map shows the latest GIS upload. Blue = raw marker. QA status coming soon.</p>
  <div id="map"></div>
  <p><a href="{{ url_for('main.home') }}">← Back to Home</a></p>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([50.1, 10.1], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    const points = [
      [50.0, 10.0],
      [50.1, 10.1],
      [50.2, 10.2],
      [50.3, 10.3]
    ];
    points.forEach(p => L.circleMarker(p, {color: 'blue'}).addTo(map));
  </script>
</body>
</html>
