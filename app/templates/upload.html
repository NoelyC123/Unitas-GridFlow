<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>SpanCore EW – Upload Survey</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="api-base-url" content="/api" />
  <meta name="poll-interval" content="2000" />
  <meta name="poll-max-attempts" content="60" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
</head>
<body class="container py-4">
  <h1 class="h4 mb-3">Upload Survey</h1>

  <div class="mb-3">
    <label for="file" class="form-label">CSV File</label>
    <input class="form-control" type="file" id="file" accept=".csv,text/csv" required />
  </div>

  <div class="mb-3">
    <label for="dno" class="form-label">DNO Rulepack</label>
    <div class="input-group">
      <select id="dno" class="form-select">
        <option value="">Auto (detect)</option>
        <option value="NIE_LV">NIE LV</option>
        <option value="NIE_11kV">NIE 11kV</option>
        <option value="SPEN_LV">SPEN LV</option>
        <option value="SPEN_11kV">SPEN 11kV</option>
        <option value="SSEN_LV">SSEN LV</option>
        <option value="SSEN_11kV">SSEN 11kV</option>
        <option value="ENWL_LV">ENWL LV</option>
        <option value="ENWL_11kV">ENWL 11kV</option>
        <option value="UKPN_LV">UKPN LV</option>
        <option value="UKPN_11kV">UKPN 11kV</option>
      </select>
      <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#rulepackModal">
        <i class="bi bi-info-circle"></i> Details
      </button>
    </div>
    <div id="rulepackBadge" class="mt-2"></div>
  </div>

  <div class="mb-3">
    <button id="btn-upload" class="btn btn-primary">
      <i class="bi bi-cloud-upload"></i> Upload &amp; Validate
    </button>
  </div>

  <div id="result" class="card d-none" style="display:none">
    <div class="card-body">
      <p class="mb-2"><strong>Job:</strong> <span id="res-job"></span></p>
      <a id="btn-map" class="btn btn-sm btn-outline-primary me-2" href="#" target="_blank">
        <i class="bi bi-map"></i> View Map
      </a>
      <a id="btn-pdf" class="btn btn-sm btn-outline-danger" href="#" target="_blank">
        <i class="bi bi-file-pdf"></i> Download PDF
      </a>
    </div>
  </div>

  <!-- Rulepack Details Modal -->
  <div class="modal fade" id="rulepackModal" tabindex="-1">
    <div class="modal-dialog modal-lg"><div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="bi bi-gear"></i> Rulepack Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="rulepackDetails">
          <p class="text-muted mb-0">Auto-detect will analyze your file.</p>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/toast.js?v=2"></script>
  <script src="/static/js/rulepack-selector.js?v=2"></script>
  <script src="/static/js/upload-manager.js?v=2"></script>
</body>
</html>
